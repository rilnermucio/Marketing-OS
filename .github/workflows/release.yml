name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extrair seção do CHANGELOG para esta versão
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extrai conteúdo entre "## [VERSION]" e o próximo "## [" ou EOF.
          # Usa index() (literal, não regex) porque "## [X.Y.Z]" tem [ ] que são
          # metacaracteres regex (character class) — match via $0 ~ ver falha silenciosamente.
          NOTES=$(awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/^---$/d' | sed '/^$/N;/^\n$/d')

          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION — ver CHANGELOG.md para detalhes."
          fi

          # Salva multilinha pra step de output
          echo "notes<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT

      - name: Criar release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Marketing OS ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            CHANGELOG.md
            README.md
            AGENTS.md
